# ╔══════════════════════════════════════════════════════════╗
# ║  RaBbLE-OS — Hyprland Configuration                      ║
# ║  Static dotfile — managed by ansible (symlinked)         ║
# ║  Hardware: ASUS ProArt P16 H7606WV                       ║
# ║            AMD Ryzen AI 9 HX 370 (Strix Point)           ║
# ║            iGPU: Radeon 890M (PCI 65:00.0)               ║
# ║            dGPU: NVIDIA RTX 4060 Mobile (PCI 64:00.0)    ║
# ╚══════════════════════════════════════════════════════════╝

# ─── Monitors ────────────────────────────────────────────────────
# ProArt P16 internal display: 3840x2400 @ 60Hz, HiDPI (16" panel)
# Scale 2 = clean integer; 1.875 = exact 1.9x if fonts feel large
monitor = eDP-1, 3840x2400@60, 0x0, 2
# External monitors: auto-detect, placed to the right
monitor = , preferred, auto, 1

# ─── Environment Variables ───────────────────────────────────────
# AMD 890M is the primary compositor GPU — drives the Wayland display
# Hyprland >= 0.41 uses the Aquamarine backend; AQ_DRM_DEVICES is preferred.
# Prefer AMD iGPU card by PCI path for deterministic ordering.
env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:65:00.0-card
# Mesa/VAAPI — AMD iGPU
env = GBM_BACKEND,radeonsi
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = LIBVA_DRIVER_NAME,radeonsi
# Qt6 Wayland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# XWayland cursor size (must match Hyprland cursor size)
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,breeze
# Electron / Chromium — force Ozone Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1
# NVIDIA PRIME offload env — use DRI_PRIME=1 %command% to run on dGPU
# The dGPU is NOT active by default; Optimus routes through AMD iGPU.
# env = __NV_PRIME_RENDER_OFFLOAD,1   # Uncomment only for specific apps

# ─── Startup ─────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hyprpaper
exec-once = hypridle
exec-once = mako
exec-once = waybar
# exec-once = quickshell  # Enable when Quickshell config is ready (Phase 0.5)

# ─── Input ───────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 0.5
        clickfinger_behavior = true
    }
    sensitivity = -0.3
    accel_profile = flat
}

# ─── General ─────────────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = rgba(ff2d78ff) rgba(00f5ffff) 45deg
    col.inactive_border = rgba(2a0060aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ─── Decoration ──────────────────────────────────────────────────
decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 0.9
        brightness = 0.8
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(ff2d7866)
        color_inactive = rgba(0a001099)
    }
}

# ─── Animations ──────────────────────────────────────────────────
animations {
    enabled = true

    bezier = rabble_in,    0.05, 0.9,  0.1,  1.05
    bezier = rabble_out,   0.3,  0.0,  0.8,  0.0
    bezier = rabble_inout, 0.87, 0.0,  0.13, 1.0
    bezier = neon_pulse,   0.0,  0.85, 0.0,  1.0

    animation = windows,          1, 4,  rabble_in,    slide
    animation = windowsOut,       1, 3,  rabble_out,   slide
    animation = windowsMove,      1, 4,  rabble_inout
    animation = border,           1, 8,  default
    animation = borderangle,      1, 60, default,      loop
    animation = fade,             1, 4,  rabble_inout
    animation = workspaces,       1, 5,  rabble_inout, slide
    animation = specialWorkspace, 1, 5,  neon_pulse,   slidevert
}

# ─── Layout ──────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

# ─── Gestures (touchpad) ─────────────────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.3
}

# ─── Misc ────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true                       # Variable framerate — battery saver
    mouse_move_enables_dpms = true
    animate_manual_resizes = true
    key_press_enables_dpms = true
}

# ─── XWayland ────────────────────────────────────────────────────
xwayland {
    use_nearest_neighbor = false     # Better XWayland rendering at 2x scale
    force_zero_scaling = false
}

# ─── Window Rules ────────────────────────────────────────────────
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = float, class:(org.kde.polkit-kde-authentication-agent-1)
windowrulev2 = float, title:(Picture-in-Picture)
windowrulev2 = pin,   title:(Picture-in-Picture)
# XWayland: disable blur to prevent artifacts at HiDPI
windowrulev2 = noblur, xwayland:1
# Fix Firefox/Electron Wayland screensharing
windowrulev2 = opacity 1.0 override 1.0 override, class:(firefox)

# ─── Keybindings ─────────────────────────────────────────────────
$mod = SUPER
$terminal = kitty
$launcher = wofi --show drun

# Core
bind = $mod,       Return,  exec, $terminal
bind = $mod,       Space,   exec, $launcher
bind = $mod,       Q,       killactive
bind = $mod SHIFT, E,       exit
bind = $mod,       F,       fullscreen
bind = $mod SHIFT, F,       togglefloating
bind = $mod,       P,       pseudo
bind = $mod,       T,       togglesplit

# Focus (vim-style)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize windows
binde = $mod CTRL, H, resizeactive, -30 0
binde = $mod CTRL, L, resizeactive, 30 0
binde = $mod CTRL, K, resizeactive, 0 -30
binde = $mod CTRL, J, resizeactive, 0 30

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Screenshots
bind = ,      Print, exec, grim ~/Pictures/screenshot-$(date +%s).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png
bind = $mod,  Print, exec, grim -g "$(slurp)" - | wl-copy

# Audio (ProArt P16 laptop keys via wpctl)
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (via brightnessctl — requires user in video group)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ASUS ROG key (Fn+F5) — cycle power profile via asusctl
bind = , XF86Launch1, exec, asusctl profile -n

# Lock screen
bind = $mod, Escape, exec, hyprlock

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
