# ╔══════════════════════════════════════════════════════════╗
# ║  RaBbLE-OS — hypridle configuration                      ║
# ║  Idle management for Hyprland                            ║
# ║  Hardware: ASUS ProArt P16 — AMD + NVIDIA                ║
# ╚══════════════════════════════════════════════════════════╝

general {
    # Lock screen before sleep (belt-and-suspenders)
    lock_cmd = pidof hyprlock || hyprlock
    # Suspend command — uses systemd-suspend, NOT systemctl suspend directly
    # systemd-suspend correctly runs sleep hooks (needed for NVIDIA VRAM preservation)
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# ── Dim display after 3 minutes of inactivity ─────────────────────
listener {
    timeout = 180
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

# ── Lock screen after 5 minutes of inactivity ─────────────────────
listener {
    timeout = 300
    on-timeout = pidof hyprlock || hyprlock
    on-resume  = hyprctl dispatch dpms on
}

# ── Turn off displays after 7 minutes ─────────────────────────────
listener {
    timeout = 420
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── Suspend after 10 minutes ───────────────────────────────────────
# Uses systemctl suspend (triggers systemd sleep hooks)
# NVIDIA VRAM is preserved via NVreg_PreserveVideoMemoryAllocations=1
listener {
    timeout = 600
    on-timeout = systemctl suspend
}
