# ╔══════════════════════════════════════════════════════════╗
# ║  RaBbLE-OS — hyprlock configuration                      ║
# ║  Lock screen — synthwave identity                        ║
# ╚══════════════════════════════════════════════════════════╝

general {
    grace = 2             # 2-second grace period after lock
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

background {
    monitor =
    color = rgba(0a0010ff)
    blur_passes = 0
    blur_size = 0
    brightness = 0.4
}

# ── Clock ─────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ff2d78ff)
    font_size = 80
    font_family = JetBrains Mono Bold
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(bf5fffcc)
    font_size = 16
    font_family = JetBrains Mono
    position = 0, 30
    halign = center
    valign = center
}

# ── RaBbLE branding ───────────────────────────────────────────────
label {
    monitor =
    text = RaBbLE
    color = rgba(bf5fff66)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, -20
    halign = center
    valign = center
}

# ── Password input ────────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 52
    outline_thickness = 1
    dots_size = 0.3
    dots_spacing = 0.15
    outer_color = rgba(ff2d7888)
    inner_color = rgba(1a004099)
    font_color = rgba(e8d5ffff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##8860aa">password...</span>
    check_color = rgba(00f5ffff)
    fail_color = rgba(ff2d78ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(ffd700ff)
    rounding = 4
    position = 0, -120
    halign = center
    valign = center
}
