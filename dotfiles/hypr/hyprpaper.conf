# Preload wallpapers into VRAM before setting
# Add your synthwave wallpaper path here:
# preload = ~/.config/hypr/wallpapers/rabble-outrun.png

# Set wallpaper per monitor (empty string = all monitors)
# wallpaper = ,~/.config/hypr/wallpapers/rabble-outrun.png

# Suppress hyprpaper startup splash
splash = false
