# dotfiles/hyprland/conf.d/workspaces.conf
# =============================================================================
# Persistent workspace definitions + layout hints
# =============================================================================

# ── Named workspaces ──────────────────────────────────────────────────────────
workspace = 1,  name:main,    persistent:true
workspace = 2,  name:web,     persistent:true
workspace = 3,  name:code,    persistent:true
workspace = 4,  name:term,    persistent:true
workspace = 5,  name:media,   persistent:true
workspace = 6,  name:chat,    persistent:true
workspace = 7,  name:files,   persistent:true
workspace = 8,  name:vms,     persistent:false
workspace = 9,  name:games,   persistent:false
workspace = 10, name:scratch, persistent:false

# ── Special (scratchpad) ──────────────────────────────────────────────────────
workspace = special:scratchpad, on-created-empty:kitty

# ── App → workspace pinning ───────────────────────────────────────────────────
windowrulev2 = workspace 2,  class:(firefox)
windowrulev2 = workspace 2,  class:(chromium)
windowrulev2 = workspace 3,  class:(Code)
windowrulev2 = workspace 3,  class:(code-oss)
windowrulev2 = workspace 3,  class:(jetbrains-)
windowrulev2 = workspace 5,  class:(mpv)
windowrulev2 = workspace 5,  class:(vlc)
windowrulev2 = workspace 5,  class:(obs)
windowrulev2 = workspace 6,  class:(discord)
windowrulev2 = workspace 6,  class:(vesktop)
windowrulev2 = workspace 6,  class:(org.telegram.desktop)
windowrulev2 = workspace 7,  class:(thunar)
windowrulev2 = workspace 7,  class:(org.gnome.Nautilus)
windowrulev2 = workspace 9,  class:(steam)
windowrulev2 = workspace 9,  class:(lutris)
