# dotfiles/hyprland/conf.d/env.conf
# Runtime environment variables for Hyprland session.
# Scale / DPI overrides are in machine.conf (ansible-generated).

# ── Wayland ───────────────────────────────────────────────────────────────────
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Qt ────────────────────────────────────────────────────────────────────────
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# ── GTK ───────────────────────────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11,*
env = GTK_USE_PORTAL,1

# ── Apps ──────────────────────────────────────────────────────────────────────
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = _JAVA_AWT_WM_NONREPARENTING,1
env = SDL_VIDEODRIVER,wayland

# ── Cursor ────────────────────────────────────────────────────────────────────
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
# XCURSOR_SIZE and HYPRCURSOR_SIZE are set in machine.conf per display

# ── Editors / tools ───────────────────────────────────────────────────────────
env = EDITOR,nvim
env = VISUAL,nvim
env = TERMINAL,foot
env = BROWSER,firefox
