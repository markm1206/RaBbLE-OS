# dotfiles/hyprland/conf.d/windowrules.conf
# =============================================================================
# windowrulev2 format: windowrulev2 = rule, matcher
# Matchers: class:, title:, workspace:, floating:, fullscreen:
# =============================================================================

# ── Float these by default ────────────────────────────────────────────────────
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = float, class:(blueberry.py)
windowrulev2 = float, class:(file-roller)
windowrulev2 = float, class:(org.gnome.Calculator)
windowrulev2 = float, class:(org.kde.polkit-kde-authentication-agent-1)
windowrulev2 = float, title:(Open File)
windowrulev2 = float, title:(Save As)
windowrulev2 = float, title:(Confirm)

# ── Size floating windows ─────────────────────────────────────────────────────
windowrulev2 = size 800 500,  class:(pavucontrol)
windowrulev2 = center,        class:(pavucontrol)
windowrulev2 = size 900 600,  class:(nm-connection-editor)
windowrulev2 = center,        class:(nm-connection-editor)

# ── Opacity ───────────────────────────────────────────────────────────────────
windowrulev2 = opacity 0.95 0.88, class:(foot)
windowrulev2 = opacity 0.95 0.88, class:(kitty)
windowrulev2 = opacity 0.97 0.92, class:(Code)
windowrulev2 = opacity 1.0  1.0,  class:(firefox)
windowrulev2 = opacity 1.0  1.0,  fullscreen:1

# ── XWayland fixes ────────────────────────────────────────────────────────────
windowrulev2 = rounding 0,    xwayland:1
windowrulev2 = noblur,        xwayland:1

# ── Scratchpad sizing ─────────────────────────────────────────────────────────
windowrulev2 = size 80% 75%,   workspace:special:scratchpad
windowrulev2 = center,         workspace:special:scratchpad

# ── Steam / gaming ────────────────────────────────────────────────────────────
windowrulev2 = float,          class:(steam), title:(Friends List)
windowrulev2 = float,          class:(steam), title:(Steam Settings)
windowrulev2 = fullscreen,     class:(steam_app_)
