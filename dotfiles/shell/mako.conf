# dotfiles/shell/mako.conf
# =============================================================================
# RaBbLE — mako notification daemon config
# Deploy to: ~/.config/mako/config
# Add to deploy-dotfiles.yml loop when needed.
# =============================================================================

# ── Layout ────────────────────────────────────────────────────────────────────
sort=-time
layer=overlay
anchor=top-right
margin=12
padding=12,16
width=340
height=120
max-visible=5
icon-path=/usr/share/icons/hicolor
max-icon-size=48

# ── Fonts ─────────────────────────────────────────────────────────────────────
font=JetBrainsMono Nerd Font 11

# ── Colors — default (info) ──────────────────────────────────────────────────
# Palette source: ansible/inventory/group_vars/all.yml
background-color=#0a0010ee
text-color=#e8d5ffff
border-color=#ff2d78cc
border-radius=10
border-size=1

# ── Progress bar ─────────────────────────────────────────────────────────────
progress-color=over #ff2d7833

# ── Timeouts ─────────────────────────────────────────────────────────────────
default-timeout=5000
ignore-timeout=0

# ── Format ───────────────────────────────────────────────────────────────────
format=<b>%s</b>\n%b
markup=1
actions=1

# ── Urgency overrides ─────────────────────────────────────────────────────────
[urgency=low]
border-color=#8860aacc
default-timeout=3000

[urgency=normal]
border-color=#ff2d78cc
default-timeout=5000

[urgency=critical]
border-color=#ff2d78ff
border-size=2
# Palette source: ansible/inventory/group_vars/all.yml
background-color=#0a0010ee
default-timeout=0

# ── App-specific ──────────────────────────────────────────────────────────────
[app-name=Spotify]
border-color=#00f5ffcc
default-timeout=4000

[app-name=discord]
border-color=#bf5fffcc

[category=volume]
border-color=#00f5ffcc
default-timeout=2000
