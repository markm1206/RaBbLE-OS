# dotfiles/shell/foot.ini
# =============================================================================
# RaBbLE — foot terminal configuration
# https://codeberg.org/dnkl/foot/wiki
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=11
font-bold=JetBrainsMono Nerd Font:weight=Bold:size=11
font-italic=JetBrainsMono Nerd Font:slant=italic:size=11
dpi-aware=yes
pad=8x8
initial-window-size-pixels=1280x800
initial-window-mode=windowed
term=foot
shell=$SHELL
login-shell=no

[scrollback]
lines=10000
multiplier=3.0

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode
protocols=http, https, ftp, ftps, file, gemini, gopher
uri-characters=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-._~:/?#[]@!$&'()*+,;=%

[cursor]
style=beam
blink=yes
blink-rate=500
color=ff2d78 e8d5ff

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

[colors]
# RaBbLE palette — source: ansible/inventory/group_vars/all.yml
alpha=0.92
background=0a0010
foreground=e8d5ff

# Cursor
cursor=ff2d78
selection-foreground=e8d5ff
selection-background=120025

# Normal (0-7)
regular0=120025   # black       (surface / deep void)
regular1=ff2d78   # red         (primary magenta)
regular2=00f5ff   # green       (accent cyan — terminal "success")
regular3=f7c948   # yellow      (amber — warnings)
regular4=bf5fff   # blue        (violet)
regular5=f7a8d4   # magenta     (pink)
regular6=00f5ff   # cyan        (accent)
regular7=e8d5ff   # white       (text)

# Bright (8-15)
bright0=8860aa    # bright black  (muted purple)
bright1=ff6b9d    # bright red    (lighter magenta)
bright2=66ffff    # bright green  (lighter cyan)
bright3=ffd966    # bright yellow
bright4=d4a0ff    # bright blue   (lighter violet)
bright5=ffcce8    # bright magenta (lighter pink)
bright6=80ffff    # bright cyan
bright7=f5f0ff    # bright white

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
font-increase=Control+equal
font-decrease=Control+minus
font-reset=Control+0
fullscreen=F11
spawn-terminal=Control+Shift+n
show-urls-launch=Control+Shift+u

[mouse-bindings]
selection-override-modifiers=Shift
primary-paste=BTN_MIDDLE
