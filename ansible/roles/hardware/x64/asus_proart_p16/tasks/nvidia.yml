---
# ╔══════════════════════════════════════════════════════════════════╗
# ║  Hardware: NVIDIA RTX 4060 Max-Q Mobile (Optimus/PRIME offload)  ║
# ║                                                                  ║
# ║  ARCHITECTURE NOTE:                                              ║
# ║  This is a laptop MUX setup — the RTX 4060 does NOT drive the   ║
# ║  display in Hybrid mode. The AMD 890M drives Wayland/KMS.        ║
# ║  NVIDIA is used via DRI_PRIME=1 for GPU-intensive workloads      ║
# ║  (LLM inference, rendering, CUDA compute).                       ║
# ║                                                                  ║
# ║  CRITICAL: nouveau is loaded by default on Fedora 43.            ║
# ║  It MUST be blacklisted before akmod-nvidia installation.        ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Step 1: Blacklist nouveau ────────────────────────────────────
- name: Blacklist nouveau kernel module
  copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      # RaBbLE-OS: Blacklist nouveau to allow akmod-nvidia
      # nouveau conflicts with the proprietary NVIDIA driver
      blacklist nouveau
      options nouveau modeset=0
  notify: regenerate initramfs

- name: Check if nouveau is currently loaded
  command: lsmod
  register: lsmod_check
  changed_when: false

- name: Warn if nouveau is still active (requires reboot after initramfs rebuild)
  debug:
    msg: |
      ⚠️  nouveau is currently loaded in RAM.
      The blacklist takes effect after initramfs rebuild + reboot.
      This playbook will rebuild initramfs — then REBOOT before next run.
  when: "'nouveau' in lsmod_check.stdout"

# ─── Step 1b: nvidia-drm fbdev (Wayland KMS, required >= driver 545) ──────────
- name: Set nvidia-drm fbdev=1 for Wayland framebuffer support
  copy:
    dest: /etc/modprobe.d/rabble-nvidia-wayland.conf
    content: |
      # RaBbLE-OS: NVIDIA Wayland / KMS options
      # fbdev=1 required for proper framebuffer on newer NVIDIA drivers (>= 545)
      # modeset=1 is set separately by supergfxd.conf
      options nvidia-drm fbdev=1
  notify: regenerate initramfs

# ─── Step 1c: SDDM greeter GPU pin ───────────────────────────────
# NVIDIA (card0) has no CRTCs in hybrid mode — sway finds no outputs and crashes.
# Pin the SDDM greeter compositor to AMD (card1) so the login screen appears.
- name: Create /etc/sddm.conf.d directory
  file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Pin SDDM sway greeter to AMD card (card1)
  copy:
    dest: /etc/sddm.conf.d/rabble-gpu.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # RaBbLE-OS: Pin SDDM greeter compositor to AMD card (card1 / PCI 0000:65:00.0)
      # NVIDIA (card0) has no CRTCs in Optimus hybrid mode — sway compositor crashes without this.
      [Wayland]
      CompositorCommand=env WLR_DRM_DEVICES=/dev/dri/card1 /usr/libexec/sddm-compositor-sway

# ─── Step 2: NVIDIA Driver Installation ──────────────────────────
- name: Install akmod-nvidia (auto-rebuilds on kernel updates)
  dnf:
    name:
      - akmod-nvidia              # Kernel module (auto-rebuilds with kmod)
      - xorg-x11-drv-nvidia       # Xorg driver (still needed even on Wayland)
      - xorg-x11-drv-nvidia-cuda  # CUDA support
      - xorg-x11-drv-nvidia-cuda-libs
      - libva-nvidia-driver  # The current Fedora 43 naming convention for Vid Accel
      - libva-utils
    state: present
  when: "'nouveau' in lsmod_check.stdout"