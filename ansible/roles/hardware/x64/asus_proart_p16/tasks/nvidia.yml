---
# ╔══════════════════════════════════════════════════════════════════╗
# ║  Hardware: NVIDIA RTX 4060 Max-Q Mobile (Optimus/PRIME offload)  ║
# ║                                                                  ║
# ║  ARCHITECTURE NOTE:                                              ║
# ║  This is a laptop MUX setup — the RTX 4060 does NOT drive the   ║
# ║  display in Hybrid mode. The AMD 890M drives Wayland/KMS.        ║
# ║  NVIDIA is used via DRI_PRIME=1 for GPU-intensive workloads      ║
# ║  (LLM inference, rendering, CUDA compute).                       ║
# ║                                                                  ║
# ║  CRITICAL: nouveau is loaded by default on Fedora 43.            ║
# ║  It MUST be blacklisted before akmod-nvidia installation.        ║
# ║                                                                  ║
# ║  This file lives on mend-I/proart-nvidia.                        ║
# ║  Epoch I carries a stub version of this task.                    ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Step 1: Blacklist nouveau ────────────────────────────────────
- name: Blacklist nouveau kernel module
  become: true
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      # RaBbLE-OS: Blacklist nouveau to allow akmod-nvidia
      # nouveau conflicts with the proprietary NVIDIA driver
      blacklist nouveau
      options nouveau modeset=0
    mode: '0644'
  notify: regenerate initramfs
  tags: [hardware, nvidia]

- name: Check if nouveau is currently loaded
  ansible.builtin.command: lsmod
  register: lsmod_check
  changed_when: false
  tags: [hardware, nvidia]

- name: Warn if nouveau is still active (initramfs rebuild + reboot required after first run)
  ansible.builtin.debug:
    msg: |
      ⚠️  nouveau is currently loaded in RAM.
      The blacklist takes effect after initramfs rebuild + reboot.
      This playbook rebuilds initramfs — REBOOT before expecting NVIDIA to be usable.
  when: "'nouveau' in lsmod_check.stdout"
  tags: [hardware, nvidia]

# ─── Step 1b: nvidia-drm Wayland KMS options ──────────────────────
# fbdev=1  — required for proper framebuffer on NVIDIA driver >= 545
# modeset=1 — required for Wayland KMS (was incorrectly assumed to be
#             set by supergfxd.conf; it isn't).
- name: Set nvidia-drm modeset=1 and fbdev=1 for Wayland KMS
  become: true
  ansible.builtin.copy:
    dest: /etc/modprobe.d/rabble-nvidia-wayland.conf
    content: |
      # RaBbLE-OS: NVIDIA Wayland / KMS options
      # modeset=1 required for Wayland KMS (required by Hyprland)
      # fbdev=1   required for proper framebuffer on driver >= 545
      options nvidia-drm modeset=1 fbdev=1
    mode: '0644'
  notify: regenerate initramfs
  tags: [hardware, nvidia]

# ─── Step 2: NVIDIA Driver Installation ──────────────────────────
# dnf state: present is idempotent. No `when: nouveau loaded` gate —
# that caused silent skips on every re-run after the first successful
# blacklist + reboot (mend-I/proart-nvidia bug fix 2026-04-22).
- name: Install akmod-nvidia (auto-rebuilds on kernel updates)
  become: true
  ansible.builtin.dnf:
    name:
      - akmod-nvidia                   # Kernel module (auto-rebuilds with kmod)
      - xorg-x11-drv-nvidia            # Xorg driver (still needed even on Wayland)
      - xorg-x11-drv-nvidia-cuda       # CUDA support
      - xorg-x11-drv-nvidia-cuda-libs
      - libva-nvidia-driver            # Fedora 43 VA-API naming
      - libva-utils
    state: present
  tags: [hardware, nvidia]

# ─── Step 3: NVIDIA power-management services ─────────────────────
# Required for s2idle suspend/resume to preserve GPU state.
# Without these, resume from suspend commonly freezes the display or
# leaves the NVIDIA context in a bad state.
- name: Enable NVIDIA power-management services (suspend / hibernate / resume)
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - nvidia-suspend.service
    - nvidia-hibernate.service
    - nvidia-resume.service
    - nvidia-powerd.service
  failed_when: false  # nvidia-powerd may be absent on some driver versions
  tags: [hardware, nvidia, power]

# ─── Step 4 (OPTIONAL): Defer NVIDIA from initramfs ───────────────
# Uncomment only if experiencing Plymouth black-flash during boot.
# Tradeoff: NVIDIA loads at graphical.target rather than early-boot;
# `nvidia-smi` unavailable until after login. See KnownIssues.md.
