---
- name: reload udev
  command: udevadm control --reload-rules

- name: trigger udev
  command: udevadm trigger

- name: regenerate initramfs
  command: dracut --force

- name: restart asusd
  systemd:
    name: asusd
    state: restarted

- name: reload systemd
  systemd:
    daemon_reload: yes
