# ansible/roles/ui_ux/hyprland/vars/main.yml
# =============================================================================
# Hyprland role — internal variables
# vars/ = role-internal, not intended for override
# defaults/ = user-overridable role config
# =============================================================================

# ── Repos ─────────────────────────────────────────────────────────────────────

hyprland_copr: "lionheartp/Hyprland"     # COPR providing Hyprland v0.54+

# ── Paths ─────────────────────────────────────────────────────────────────────
# rabble_home and dotfiles_repo_root are set in group_vars/all.yml and resolve
# to the invoking user's home and repo root regardless of become: true.

hypr_config_dir: "{{ rabble_home }}/.config/hypr"

# ── Config files ──────────────────────────────────────────────────────────────
# Deployed with mode 0644 via the "Deploy hypr config files" task.
# src paths are relative to dotfiles_repo_root.

hypr_config_files:
  - src:  config/hypr/hyprland.conf
    dest: "{{ hypr_config_dir }}/hyprland.conf"

  # conf.d modules
  - src:  config/hypr/conf.d/animations.conf
    dest: "{{ hypr_config_dir }}/conf.d/animations.conf"
  - src:  config/hypr/conf.d/autostart.conf
    dest: "{{ hypr_config_dir }}/conf.d/autostart.conf"
  - src:  config/hypr/conf.d/env.conf
    dest: "{{ hypr_config_dir }}/conf.d/env.conf"
  - src:  config/hypr/conf.d/input.conf
    dest: "{{ hypr_config_dir }}/conf.d/input.conf"
  - src:  config/hypr/conf.d/keybinds.conf
    dest: "{{ hypr_config_dir }}/conf.d/keybinds.conf"
  - src:  config/hypr/conf.d/look.conf
    dest: "{{ hypr_config_dir }}/conf.d/look.conf"
  - src:  config/hypr/conf.d/windowrules.conf
    dest: "{{ hypr_config_dir }}/conf.d/windowrules.conf"
  - src:  config/hypr/conf.d/workspaces.conf
    dest: "{{ hypr_config_dir }}/conf.d/workspaces.conf"
  - src:  config/hypr/conf.d/functionkeys.conf
    dest: "{{ hypr_config_dir }}/conf.d/functionkeys.conf"

  # hypridle.conf — must live at ~/.config/hypr/hypridle.conf 
  # hypridle aborts with SIGABRT if this file is missing at launch.
  - src:  config/hypr/conf.d/hypridle.conf
    dest: "{{ hypr_config_dir }}/hypridle.conf"

  # hyprlock.conf — must live at ~/.config/hypr/hyprlock.conf 
  - src:  config/hypr/hyprlock.conf
    dest: "{{ hypr_config_dir }}/hyprlock.conf"

# ── Scripts ───────────────────────────────────────────────────────────────────
# Deployed with mode 0755 via the "Deploy hypr scripts" task.

hypr_scripts:
  - src:  config/hypr/scripts/help.sh
    dest: "{{ hypr_config_dir }}/scripts/help.sh"
  - src:  config/hypr/scripts/screenshot.sh
    dest: "{{ hypr_config_dir }}/scripts/screenshot.sh"

# ── Packages ──────────────────────────────────────────────────────────────────

hyprland_core_packages:
  - hyprland                       # Wayland compositor
  - hyprland-devel                 # Plugin support via hyprpm
  - xdg-desktop-portal-hyprland   # Screensharing and portal support
  - hyprland-guiutils
  - hyprpaper                      # Wallpaper daemon
  - hypridle                       # Idle daemon
  - hyprlock                       # Screen locker
  - hyprcursor                     # Cursor management
  - hyprpicker                     # Colour picker
  - polkit                         # Privilege escalation framework
  - hyprpolkitagent                # Polkit authentication agent for Hyprland

