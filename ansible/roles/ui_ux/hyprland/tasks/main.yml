# ansible/roles/ui_ux/hyprland/tasks/main.yml

- name: Enable Hyprland COPR
  community.general.copr:
    name: "{{ hyprland_copr }}"
    state: enabled
  become: true
  tags: [ui_ux, hyprland, repos]

- name: Install Hyprland core packages
  ansible.builtin.dnf:
    name: "{{ hyprland_core_packages }}"
    state: present
  become: true
  tags: [ui_ux, hyprland, hyprland_core]

- name: Install Wayland utility packages
  ansible.builtin.dnf:
    name: "{{ wayland_utility_packages }}"
    state: present
  become: true
  tags: [ui_ux, hyprland, utilities]

- name: Install Qt Wayland support
  ansible.builtin.dnf:
    name: "{{ wayland_qt_support }}"
    state: present
  become: true
  tags: [ui_ux, hyprland, qt]