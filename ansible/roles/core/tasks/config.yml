---
# core/tasks/config.yml — System identity and base configuration

- name: Deploy /etc/os-release (RaBbLE-OS identity)
  ansible.builtin.template:
    src: os-release.j2
    dest: /etc/os-release
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: rebuild grub config
  tags: [base, config, identity]
