---
# ansible/inventory/group_vars/all.yml
# =============================================================================
# RaBbLE — Global defaults (all targets)
# Override per hardware target in group_vars/<target>.yml
# =============================================================================

# ── Identity ──────────────────────────────────────────────────────────────────
rabble_user:      "{{ ansible_user_id }}"
rabble_home:      "{{ ansible_env.HOME }}"
rabble_repo_root: "{{ playbook_dir | dirname }}"

# ── Paths ─────────────────────────────────────────────────────────────────────
rabble_dotfiles_dir: "{{ rabble_repo_root }}/dotfiles"
rabble_themes_dir:   "{{ rabble_repo_root }}/themes"
rabble_config_home:  "{{ rabble_home }}/.config"

# ── Theme palette — synthwave ─────────────────────────────────────────────────
rabble_color_bg:      "#0a0010"   # Deep void
rabble_color_primary: "#ff2d78"   # Hot magenta — borders, highlights, prompt
rabble_color_accent:  "#00f5ff"   # Electric cyan — git, status, secondary accents
rabble_color_violet:  "#bf5fff"   # Soft violet — decorative, tertiary accents
rabble_color_pink:    "#f7a8d4"   # Soft pink — untracked files, magenta-adjacent
rabble_color_text:    "#e8d5ff"   # Off-white with purple tint — primary text
rabble_color_muted:   "#8860aa"   # Muted purple — secondary/dim text
rabble_color_surface: "#120025"   # Elevated surface — input fields, cards

# ── Display / HiDPI defaults (override per hardware target) ───────────────────
# GRUB gfxmode: keep this at a READABLE resolution — not native 4K.
# The kernel inherits native res from firmware; GRUB menu at 1280x800 is fine.
rabble_hidpi_scale:    1
rabble_grub_gfxmode:   "1280x800x32,auto"
rabble_grub_gfxpayload: "keep"

# ── TTY font (override per hardware target) ───────────────────────────────────
rabble_console_font:   "ter-v22b"    # Readable at 1080p
rabble_console_keymap: "us"

# ── GRUB ──────────────────────────────────────────────────────────────────────
rabble_grub_timeout:       3
rabble_grub_default:       0
rabble_grub_extra_cmdline: ""   # Append extra kernel params here

# ── Locale ────────────────────────────────────────────────────────────────────
system_locale: "en_US.UTF-8"

# ── Snapper ───────────────────────────────────────────────────────────────────
# Fedora 43 default btrfs layout uses 'root'/'home', not '@'/'@home'
rabble_btrfs_root_subvol: "root"
rabble_btrfs_home_subvol: "home"

rabble_snapper_configs:
  - name: root
    subvolume: /
    timeline_create: "yes"
    timeline_limit_hourly: "5"
    timeline_limit_daily: "7"
    timeline_limit_weekly: "4"
    timeline_limit_monthly: "6"
    timeline_limit_yearly: "2"

# ── Desktop ───────────────────────────────────────────────────────────────────
rabble_default_shell: zsh    # zsh | bash
