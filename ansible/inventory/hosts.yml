# ansible/inventory/hosts.yml

all:
  children:

    # ── Architecture ──────────────────────────────────────────
    x64:
      children:
        laptops:
          hosts:
            localhost:
        desktops:
          hosts: {}

    aarch64:
      children:
        sbc:
          hosts: {}

    # ── Hardware Profiles ─────────────────────────────────────
    # These groups drive group_vars lookups for power/hardware config.
    # A host can belong to both an arch group AND a hardware profile group.
    asus_proart_p16:
      hosts:
        localhost:

    generic_x64:
      hosts: {}

    sbc_0:
      hosts: {}

  vars:
    rabble_repo_root: "{{ playbook_dir | dirname }}"