# ansible/inventory/hosts.yml
# =============================================================================
# RaBbLE Host Inventory
# =============================================================================
# For local deployment, localhost is used.
# To deploy to a remote machine, add it under the appropriate group.
# =============================================================================

all:
  children:

    # -------------------------------------------------------------------------
    # x64 targets
    # -------------------------------------------------------------------------
    x64:
      children:
        asus_proart_p16:
          hosts:
            localhost:
              ansible_connection: local
              ansible_python_interpreter: /usr/bin/python3

        generic_x64:
          hosts: {}

    # -------------------------------------------------------------------------
    # aarch64 targets
    # -------------------------------------------------------------------------
    aarch64:
      children:
        sbc_0:
          hosts: {}

  # Global vars (overridden by group_vars and host_vars)
  vars:
    rabble_repo_root: "{{ playbook_dir | dirname }}"
