[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
collections_path    = ~/.ansible/collections
retry_files_enabled = false
stdout_callback     = yaml
callbacks_enabled   = profile_tasks    # Shows per-task timing
interpreter_python  = auto_silent

# Diff mode — shows what changed in config files
diff                = true

[privilege_escalation]
become              = true
become_method       = sudo
become_ask_pass     = false

[ssh_connection]
pipelining          = true
