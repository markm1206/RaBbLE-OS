# ~/.config/kitty/kitty.conf — RaBbLE-OS terminal configuration
# Palette: RaBbLE synthwave outrun (grimoire/RaBbLE-Palette.md)

# ── Font ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
disable_ligatures never

# ── Colors — RaBbLE synthwave outrun ─────────────────────────────────────────
foreground            #e8e6f0
background            #0a0010
selection_foreground  #0a0010
selection_background  #ff2d78

# Black (surface/raised)
color0   #12132a
color8   #2a2840

# Red (error)
color1   #e05c6f
color9   #ff4d6d

# Green (success)
color2   #50fa7b
color10  #69ff94

# Yellow (warning)
color3   #f1fa8c
color11  #ffffa5

# Blue (info)
color4   #6272a4
color12  #82aaff

# Magenta (primary neon)
color5   #ff2d78
color13  #ff79c6

# Cyan (secondary neon)
color6   #00f5ff
color14  #80ffff

# White (text)
color7   #e8e6f0
color15  #ffffff

# URLs
url_color   #00f5ff
url_style   curly

# Cursor — magenta, blinks at 0.5s
cursor               #ff2d78
cursor_text_color    #0a0010
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0

# ── Window ────────────────────────────────────────────────────────────────────
background_opacity    0.92
window_padding_width  12
hide_window_decorations yes
remember_window_size  yes
initial_window_width  120c
initial_window_height 35c

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines      10000
scrollback_pager      less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.0

# ── Tabs ──────────────────────────────────────────────────────────────────────
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_background          #0a0010
tab_bar_margin_color        #0a0010
active_tab_foreground       #0a0010
active_tab_background       #ff2d78
active_tab_font_style       bold
inactive_tab_foreground     #6b6880
inactive_tab_background     #12132a

# ── Misc ──────────────────────────────────────────────────────────────────────
copy_on_select              clipboard
strip_trailing_spaces       smart
close_on_child_death        no
allow_remote_control        yes
shell_integration           enabled
