# hyprpaper.conf — RaBbLE-OS wallpaper configuration

# Wallpaper assets live in config/wallpapers/ → deployed to ~/.config/wallpapers/

preload  = ~/.config/wallpapers/wallpaper.png

wallpaper {
    monitor = eDP-1
    path = ~/.config/wallpapers/wallpaper.png
    fit_mode = cover
}

wallpaper {
    monitor = HDMI-A-1
    path = ~/.config/wallpapers/wallpaper.png
    fit_mode = cover
}

splash = false