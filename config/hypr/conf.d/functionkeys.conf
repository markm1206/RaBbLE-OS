# config/hyprland/conf.d/function_keys.conf
# =============================================================================
# Function Key Bindings — ASUS ProArt P16
#
# OSD feedback provided by swayosd (must be running — see autostart.conf)
# swayosd-server must be started before these binds will show overlays
#
# Keys marked [REQUIRES ASUSCTL] will silently no-op until the hardware
# role is fixed and asusd is running. The binds are correct — just dormant.
#
# Key name reference:
#   XF86AudioMute, XF86AudioLowerVolume, XF86AudioRaiseVolume
#   XF86AudioMicMute
#   XF86MonBrightnessUp, XF86MonBrightnessDown
#   XF86KbdBrightnessUp, XF86KbdBrightnessDown, XF86KbdLightOnOff
#   XF86Display
#   XF86Launch1 (custom ASUS key — may vary by BIOS)
#   XF86Launch4 (Copilot/assistant key on ASUS — may vary)
#   XF86WebCam
# =============================================================================

# ── Volume ────────────────────────────────────────────────────────────────────

# Mute / unmute audio output
bind = , XF86AudioMute, exec, swayosd-client --output-volume=0


# Volume down — hold to repeat
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower

# Volume up — hold to repeat
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise

# ── Microphone ────────────────────────────────────────────────────────────────

# Mute / unmute microphone input
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Brightness ────────────────────────────────────────────────────────────────

# Brightness up — hold to repeat
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise

# Brightness down — hold to repeat
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ── Keyboard Backlight ────────────────────────────────────────────────────────
# [REQUIRES ASUSCTL] — asusd must be running for these to take effect
# Once hardware role is fixed, these will work without changes here

# Toggle keyboard backlight on/off
bind = , XF86KbdLightOnOff, exec, asusctl -k off || asusctl -k low

# Keyboard backlight brightness up
bind = , XF86KbdBrightnessUp, exec, asusctl kbd-bright up

# Keyboard backlight brightness down
bind = , XF86KbdBrightnessDown, exec, asusctl kbd-bright down

# ── Display ───────────────────────────────────────────────────────────────────

# Display mode switcher — cycle monitor layouts via kanshi
# kanshictl switch cycles through profiles defined in ~/.config/kanshi/config
bind = , XF86Display, exec, kanshictl switch

# ── Screen Capture ────────────────────────────────────────────────────────────

# Full screen capture → save to ~/Pictures/Screenshots/
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date '+%Y-%m-%d_%H-%M-%S').png

# Region select capture → save to ~/Pictures/Screenshots/
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date '+%Y-%m-%d_%H-%M-%S').png

# Region select capture → copy to clipboard (no file saved)
bind = CTRL, Print, exec, grim -g "$(slurp)" - | wl-copy

# ── Emoji Launcher ────────────────────────────────────────────────────────────
# Requires: rofimoji (dnf install rofimoji)
# rofimoji uses fuzzel as the picker backend
# On ASUS, the emoji key may appear as XF86Messenger or have no keysym — SUPER+Period as fallback

bind = , XF86Messenger, exec, rofimoji --selector fuzzel
bind = SUPER, Period, exec, rofimoji --selector fuzzel

# ── ASUS Custom Keys ──────────────────────────────────────────────────────────
# [REQUIRES ASUSCTL for full platform integration]
# XF86Launch1 = ROG/ASUS custom key (physical Armoury Crate button on some models)
# XF86Launch4 = Copilot / AI assistant key (present on newer ASUS models)
# Exact keysyms depend on BIOS version — verify with: wev | grep -i launch

# Custom ASUS key — launch a terminal scratchpad or system monitor
bind = , XF86Launch1, exec, kitty --title "rabble-scratch"

# Assistant key — placeholder until RaBbLE entity is wired in Phase 2/3
# For now launches a Claude Code session or aichat
bind = , XF86Assistant, exec, kitty --title "rabble-assistant" -e bash -c "echo 'RaBbLE entity dormant // %ENTITY_DORMANT%'; bash"

# ── Caps Lock ─────────────────────────────────────────────────────────────────
# Hyprland handles Caps Lock natively — the LED state is managed by the compositor
# swayosd shows a caps lock OSD indicator when the key is pressed
# No explicit bind needed — just ensure swayosd-server is running

# If the LED is not toggling, verify the keyboard is in input group:
# sudo usermod -aG input $USER  (handled by core role)
# =============================================================================