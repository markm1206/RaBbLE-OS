# dotfiles/hyprland/conf.d/hypridle.conf
# Deployed to ~/.config/hypr/hypridle.conf by deploy-dotfiles playbook
# =============================================================================
# Lock / idle / suspend chain:
#
#   Lid close   → autostart.conf bindl fires hyprlock + systemctl suspend
#                 simultaneously. logind drop-in (99-hyprland-lid.conf) sets
#                 HandleLidSwitch=ignore so logind does not race hypridle.
#
#   5 min idle  → lock screen
#   5.5 min     → DPMS off
#   15 min      → suspend
# =============================================================================

general {
    lock_cmd            = pidof hyprlock || hyprlock   # never spawn more than one
    before_sleep_cmd    = loginctl lock-session         # ensure locked before any suspend
    after_sleep_cmd     = hyprctl dispatch dpms on      # wake display on resume
    ignore_dbus_inhibit = false
}

# ── Idle timeout chain ────────────────────────────────────────────────────────

listener {
    timeout    = 300                                    # 5 min — lock
    on-timeout = loginctl lock-session
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout    = 330                                    # 5.5 min — display off
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout    = 900                                    # 15 min — suspend
    on-timeout = systemctl suspend
}