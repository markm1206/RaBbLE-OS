# hypridle.conf — RaBbLE-OS idle daemon configuration
# epoch-I: minimal functional config

general {
    lock_cmd          = hyprlock
    before_sleep_cmd  = hyprlock
    after_sleep_cmd   = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Screen lock after 5 minutes idle
listener {
    timeout   = 300
    on-timeout = hyprlock
}

# Display off after 10 minutes idle
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
