# conf.d/workspaces.conf
# =============================================================================
# Workspaces — numbered 1–10, no semantic names
# Persistent workspaces stay alive when empty.
# App-to-workspace assignments live in windowrules.conf.
# =============================================================================

# ── Persistent (1–7) ──────────────────────────────────────────────────────────
workspacerule = persistent 1, match:id 1
workspacerule = persistent 1, match:id 2
workspacerule = persistent 1, match:id 3
workspacerule = persistent 1, match:id 4
workspacerule = persistent 1, match:id 5
workspacerule = persistent 1, match:id 6
workspacerule = persistent 1, match:id 7

# ── On-demand (8–10) ──────────────────────────────────────────────────────────
workspacerule = persistent 0, match:id 8
workspacerule = persistent 0, match:id 9
workspacerule = persistent 0, match:id 10

# ── HDMI display (workspace 11) ───────────────────────────────────────────────
# Pinned to HDMI-A-1; migrates back to primary if the monitor is disconnected.
# The hdmi-hotplug.sh script moves it to the correct output on hotplug.
workspace = 11, monitor:HDMI-A-1, persistent:true, defaultName:hdmi

# ── Special (scratchpad) ──────────────────────────────────────────────────────
workspacerule = on_created_empty kitty, match:name special:scratchpad
