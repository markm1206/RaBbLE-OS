# dotfiles/hyprland/conf.d/workspaces.conf
# =============================================================================
# Unified Workspace Rules (v0.54+)
# Syntax: workspacerule = <rule>, match:<property>
# =============================================================================

# ── Persistent Workspaces ─────────────────────────────────────────────────────
# We match by ID and apply both a Name and the Persistent flag
workspacerule = name main,    persistent 1, match:id 1
workspacerule = name web,     persistent 1, match:id 2
workspacerule = name code,    persistent 1, match:id 3
workspacerule = name term,    persistent 1, match:id 4
workspacerule = name media,   persistent 1, match:id 5
workspacerule = name chat,    persistent 1, match:id 6
workspacerule = name files,   persistent 1, match:id 7
workspacerule = name vms,     persistent 0, match:id 8
workspacerule = name games,   persistent 0, match:id 9
workspacerule = name scratch, persistent 0, match:id 10

# ── Special (scratchpad) ──────────────────────────────────────────────────────
# Note: 'on_created_empty' uses snake_case in the unified system
workspacerule = on_created_empty kitty, match:name special:scratchpad

# ── App → workspace pinning ───────────────────────────────────────────────────
# These remain 'windowrule' because they target WINDOWS, not the workspace itself.
# However, they must use the new v0.54 unified syntax.
windowrule = workspace 2, match:initial_class ^(firefox)$
windowrule = workspace 2, match:initial_class ^(chromium)$

windowrule = workspace 3, match:initial_class ^(Code)$
windowrule = workspace 3, match:initial_class ^(code-oss)$
windowrule = workspace 3, match:initial_class ^(jetbrains-.*)$

windowrule = workspace 5, match:initial_class ^(mpv)$
windowrule = workspace 5, match:initial_class ^(vlc)$
windowrule = workspace 5, match:initial_class ^(obs)$

windowrule = workspace 6, match:initial_class ^(discord)$
windowrule = workspace 6, match:initial_class ^(vesktop)$
windowrule = workspace 6, match:initial_class ^(org.telegram.desktop)$

windowrule = workspace 7, match:initial_class ^(thunar)$
windowrule = workspace 7, match:initial_class ^(org.gnome.Nautilus)$

windowrule = workspace 9, match:initial_class ^(steam)$
windowrule = workspace 9, match:initial_class ^(lutris)$