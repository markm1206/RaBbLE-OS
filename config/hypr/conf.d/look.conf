# dotfiles/hyprland/conf.d/look.conf
# Visual appearance — gaps, borders, rounding, shadows, blur
#
# Palette source: ansible/inventory/group_vars/all.yml
#   rabble_color_bg:      #0a0010   Deep void
#   rabble_color_primary: #ff2d78   Hot magenta
#   rabble_color_accent:  #00f5ff   Electric cyan
#   rabble_color_violet:  #bf5fff   Soft violet
#   rabble_color_text:    #e8d5ff   Off-white / purple tint
#   rabble_color_muted:   #8860aa   Muted purple
#   rabble_color_surface: #120025   Elevated surface

general {
    gaps_in              = 4
    gaps_out             = 10
    border_size          = 2

    # Active: magenta → cyan gradient (synthwave sweep)
    col.active_border    = rgba(ff2d78ff) rgba(00f5ffff) 45deg
    col.inactive_border  = rgba(8860aa33)

    layout               = dwindle
    resize_on_border     = true
    extend_border_grab_area = 10
}

decoration {
    rounding             = 10

    active_opacity       = 1.0
    inactive_opacity     = 0.93
    fullscreen_opacity   = 1.0

    shadow {
        enabled          = true
        range            = 24
        render_power     = 3
        color            = rgba(ff2d7822)   # faint magenta glow on active
        color_inactive   = rgba(0a001099)
        offset           = 0 4
    }

    blur {
        enabled          = true
        size             = 8
        passes           = 3
        new_optimizations= true
        xray             = false
        noise            = 0.02
        contrast         = 0.9
        brightness       = 0.8
        popups           = true
    }
}

dwindle {
    pseudotile           = false
    preserve_split       = true
    smart_split          = false
    smart_resizing       = true
}

master {
    new_status           = slave
    mfact                = 0.55
}

misc {
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    vrr                          = 1
    focus_on_activate            = false
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
}

group {
    col.border_active          = rgba(ff2d78ff)
    col.border_inactive        = rgba(8860aa33)
    col.border_locked_active   = rgba(00f5ffff)
    col.border_locked_inactive = rgba(12002566)

    groupbar {
        enabled        = true
        height         = 3
        render_titles  = false
        col.active     = rgba(ff2d78ff)
        col.inactive   = rgba(8860aa55)
    }
}
