# dotfiles/hyprland/conf.d/keybinds.conf
# =============================================================================
# Key: SUPER = Windows/Meta key  
# =============================================================================

$mod     = SUPER
$term    = kitty
$menu    = fuzzel
$browser = firefox
$files   = dolphin
$lock    = hyprlock

# ── Session ───────────────────────────────────────────────────────────────────
bind = $mod SHIFT, Q,     killactive
bind = $mod SHIFT, E,     exit
bind = $mod,       L,     exec, $lock
bind = $mod,       F1,    exec, ~/.config/hypr/scripts/help.sh

# ── Apps ──────────────────────────────────────────────────────────────────────
bind = $mod,       Return, exec, $term
bind = $mod,       Space,  exec, $menu
bind = $mod,       B,      exec, $browser
bind = $mod,       E,      exec, $files
bind = $mod SHIFT, S,      exec, grim -g "$(slurp)" - | wl-copy   # screenshot region → clipboard
bind = $mod,       S,      exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mod SHIFT, C,      exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# ── Window layout ─────────────────────────────────────────────────────────────
bind = $mod,       F,      fullscreen, 0
bind = $mod SHIFT, F,      fullscreen, 1                           # fake-fullscreen
bind = $mod,       V,      togglefloating
bind = $mod,       P,      pseudo                                  # dwindle pseudo tile
bind = $mod,       G,      togglegroup

# ── Split direction (dwindle) — i3-style pre-split ────────────────────────────
# Set which direction the NEXT window opens relative to current focus
# Super+Ctrl+H/L = next window opens to the left/right (horizontal split)
# Super+Ctrl+K/J = next window opens above/below (vertical split)
bind = $mod CTRL,  H,     layoutmsg, preselect l
bind = $mod CTRL,  L,     layoutmsg, preselect r
bind = $mod CTRL,  K,     layoutmsg, preselect u
bind = $mod CTRL,  J,     layoutmsg, preselect d
bind = $mod CTRL,  left,  layoutmsg, preselect l
bind = $mod CTRL,  right, layoutmsg, preselect r
bind = $mod CTRL,  up,    layoutmsg, preselect u
bind = $mod CTRL,  down,  layoutmsg, preselect d

# Toggle spawn direction — flip between row (side-by-side) and column (stacked)
bind = $mod,       T,      layoutmsg, togglesplit

# Toggle layout: dwindle ↔ master (Super+O — "O" for orientation)
bind = $mod,       O,      exec, hyprctl keyword general:layout master
bind = $mod SHIFT, O,      exec, hyprctl keyword general:layout dwindle

# Master layout helpers (useful when toggled into master mode)
bind = $mod SHIFT, Return, layoutmsg, swapwithmaster
bind = $mod,       comma,  layoutmsg, removemaster
bind = $mod,       period, layoutmsg, addmaster

# Group management (stack windows in same tile slot)
bind = $mod ALT,   H,      moveintogroup, l
bind = $mod ALT,   L,      moveintogroup, r
bind = $mod ALT,   K,      moveintogroup, u
bind = $mod ALT,   J,      moveintogroup, d
bind = $mod ALT,   left,   moveintogroup, l
bind = $mod ALT,   right,  moveintogroup, r
bind = $mod ALT,   escape, moveoutofgroup

# ── Focus (Vim-style + arrow keys) ───────────────────────────────────────────
bind = $mod,       H,      movefocus, l
bind = $mod,       L,      movefocus, r
bind = $mod,       K,      movefocus, u
bind = $mod,       J,      movefocus, d
bind = $mod,       left,   movefocus, l
bind = $mod,       right,  movefocus, r
bind = $mod,       up,     movefocus, u
bind = $mod,       down,   movefocus, d

# ── Move / swap windows ───────────────────────────────────────────────────────
# HJKL — swap with adjacent neighbor (needs a window in that direction)
bind = $mod SHIFT, H,     swapwindow, l
bind = $mod SHIFT, L,     swapwindow, r
bind = $mod SHIFT, K,     swapwindow, u
bind = $mod SHIFT, J,     swapwindow, d
# Arrows — move window through the layout; works in all directions with two windows.
# Moving into an empty direction restructures the split (e.g. side-by-side → stacked).
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Resize (hold $mod + R, then arrow/HJKL) ──────────────────────────────────
bind  = $mod,       R,      submap, resize
submap = resize
binde = ,           H,      resizeactive, -30 0
binde = ,           L,      resizeactive,  30 0
binde = ,           K,      resizeactive, 0 -30
binde = ,           J,      resizeactive, 0  30
binde = ,           left,   resizeactive, -30 0
binde = ,           right,  resizeactive,  30 0
binde = ,           up,     resizeactive, 0 -30
binde = ,           down,   resizeactive, 0  30
bind  = ,           escape, submap, reset
bind  = ,           Return, submap, reset
submap = reset

# ── Workspaces 1–10 ───────────────────────────────────────────────────────────
bind = $mod,       1,      workspace, 1
bind = $mod,       2,      workspace, 2
bind = $mod,       3,      workspace, 3
bind = $mod,       4,      workspace, 4
bind = $mod,       5,      workspace, 5
bind = $mod,       6,      workspace, 6
bind = $mod,       7,      workspace, 7
bind = $mod,       8,      workspace, 8
bind = $mod,       9,      workspace, 9
bind = $mod,       0,      workspace, 10

bind = $mod SHIFT, 1,      movetoworkspace, 1
bind = $mod SHIFT, 2,      movetoworkspace, 2
bind = $mod SHIFT, 3,      movetoworkspace, 3
bind = $mod SHIFT, 4,      movetoworkspace, 4
bind = $mod SHIFT, 5,      movetoworkspace, 5
bind = $mod SHIFT, 6,      movetoworkspace, 6
bind = $mod SHIFT, 7,      movetoworkspace, 7
bind = $mod SHIFT, 8,      movetoworkspace, 8
bind = $mod SHIFT, 9,      movetoworkspace, 9
bind = $mod SHIFT, 0,      movetoworkspace, 10

# Cycle workspaces
bind = $mod,       Tab,          workspace, previous
bind = $mod,       mouse_down,   workspace, e+1
bind = $mod,       mouse_up,     workspace, e-1
bind = $mod,       bracketright, workspace, e+1
bind = $mod,       bracketleft,  workspace, e-1

# ── Scratchpad ────────────────────────────────────────────────────────────────
bind = $mod,       grave, togglespecialworkspace, scratchpad
bind = $mod SHIFT, grave, movetoworkspace, special:scratchpad

# ── Mouse binds ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
