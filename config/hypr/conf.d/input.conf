# dotfiles/hyprland/conf.d/input.conf

input {
    kb_layout    = us
    kb_variant   =
    kb_model     =
    kb_rules     =
    numlock_by_default = true

    follow_mouse = 1
    mouse_refocus= true

    # -1.0 to 1.0 — 0 = no acceleration ; Setting 0.2, adaptive to mimic MacOS feel
    sensitivity = 0.2
    accel_profile = adaptive

    touchpad {
    
        # 1. Natural Scrolling (macOS style)
        natural_scroll = true
        scroll_factor        = 0.8

        # 2. Tap-to-click (Essential for the Mac feel)
        tap-to-click = true

        # 3. macOS Style Clicking: 
        # 1 finger = Left Click, 2 fingers = Right Click, 3 fingers = Middle Click
        # This disables the "bottom right corner = right click" behavior.
        clickfinger_behavior = true

        # 4. Smoothness & Precision
        disable_while_typing = true
        middle_button_emulation = true
        
        # Optional: Set to 'true' if you want a very light tap to register
        tap-and-drag = true
        drag_lock            = false
    }
}

gestures {
    # The new unified gesture command
    # Syntax: gesture = fingers, direction, action, options
    gesture = 3, horizontal, workspace

    # These settings remain mostly the same but may require updated naming 
    # depending on your specific version (check 'hyprctl configerrors')
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever = false
}

binds {
    allow_workspace_cycles = true
}
