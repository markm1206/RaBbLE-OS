# conf.d/monitors.conf
# =============================================================================
# Monitor layout and hotplug rules.
# Run `hyprctl monitors` to find exact output names on your system.
# =============================================================================

# ── Primary display ───────────────────────────────────────────────────────────
# No catch-all here — Hyprland auto-configures unlisted displays natively,
# preserving whatever scale/resolution they negotiate.

# ── HDMI hotplug ─────────────────────────────────────────────────────────────
# Activates automatically when HDMI-A-1 is connected.
# Workspace 11 is pinned to this output (see workspaces.conf).
# Position: auto-right of the primary display.
# If your port enumerates as HDMI-A-2 or DP-1, duplicate this line with the
# correct name — the hdmi-hotplug.sh script matches on "HDMI-*" prefix.
monitor = HDMI-A-1, 1920x1080@59.94, auto-right, 1
