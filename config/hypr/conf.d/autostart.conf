# dotfiles/hyprland/conf.d/autostart.conf
# =============================================================================
# exec-once: runs once on Hyprland start
# exec:      runs on every reload
# =============================================================================

# ── System services ───────────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start xdg-desktop-portal-hyprland

# ── Notification daemon ───────────────────────────────────────────────────────
exec-once = mako

# ── Clipboard ─────────────────────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Idle & lock ───────────────────────────────────────────────────────────────
exec-once = hypridle

# ── Wallpaper ─────────────────────────────────────────────────────────────────
exec-once = hyprpaper
# Config: ~/.config/hypr/hyprpaper.conf (not symlinked — machine-local wallpaper path)

# ── Shell UI ──────────────────────────────────────────────────────────────────
# Waybar is active. Quickshell replaces it in Phase 1.2 when stable.
exec-once = waybar
# exec-once = quickshell   # Phase 1.2 — replace waybar once QML bar is stable

# ── Network manager tray ──────────────────────────────────────────────────────
exec-once = nm-applet --indicator
