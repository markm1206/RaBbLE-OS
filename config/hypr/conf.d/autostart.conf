# dotfiles/hyprland/conf.d/autostart.conf
# =============================================================================
# exec-once: runs once on Hyprland start
# exec:      runs on every reload
# =============================================================================

# ── System services ───────────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start xdg-desktop-portal-hyprland

# ── Notification daemon ───────────────────────────────────────────────────────
exec-once = mako

# ── Clipboard ─────────────────────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Idle & lock ───────────────────────────────────────────────────────────────
# hypridle requires ~/.config/hypr/hypridle.conf to exist or it aborts (sig 6)
exec-once = hypridle
# Lid close suspend is handled by logind (99-rabble-lid.conf: HandleLidSwitch=suspend).
# hypridle's before_sleep_cmd = loginctl lock-session fires hyprlock before suspend.

# ── Wallpaper ─────────────────────────────────────────────────────────────────
exec-once = hyprpaper
# Config: ~/.config/hypr/hyprpaper.conf — deployed by Ansible, wallpaper at ~/.config/hypr/wallpapers/

# ── Shell UI ──────────────────────────────────────────────────────────────────
exec-once = waybar
# exec-once = quickshell   # Phase 1.2 — replace waybar once QML bar is stable

# ── Network manager tray ──────────────────────────────────────────────────────
exec-once = nm-applet --indicator

# OSD server for volume/brightness/caps lock feedback
exec-once = swayosd-server

# ── HDMI hotplug ──────────────────────────────────────────────────────────────
exec-once = ~/.config/hypr/scripts/hdmi-hotplug.sh

# ── Split direction daemon ────────────────────────────────────────────────────
# Enforces persistent split mode (Super+T toggle). Re-applies preselect after
# every new window so the mode holds until toggled again.
exec-once = ~/.config/hypr/scripts/split-dir-daemon.sh

