# conf.d/windowrules.conf
# =============================================================================
# Window & Layer Rules
# =============================================================================

# ── HDMI workspace (11) — fullscreen by default ───────────────────────────────
#windowrule = fullscreen, match:workspace 11

# ── Idle inhibit ──────────────────────────────────────────────────────────────
windowrule = idle_inhibit fullscreen, match:class ^(mpv|vlc|celluloid)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox|chromium|brave-browser|zen)$

# ── Picture-in-Picture ────────────────────────────────────────────────────────
windowrule = float true,             match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)
windowrule = keep_aspect_ratio true, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)
windowrule = pin true,               match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)
windowrule = size 25% 25%,           match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)
windowrule = move 73% 72%,           match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)

# ── Float: system dialogs and file pickers ────────────────────────────────────
# Generic title-based float (save/open dialogs in many apps)
windowrule = float true,  match:title ^(Open|Save|Save As|Open File|Open Folder|Select File)
windowrule = float true,  match:title ^(Confirm|Warning|Error|Alert|Question|Information)
windowrule = float true,  match:title ^(File Manager|File Browser|File Chooser)
windowrule = float true,  match:title (Preference|Preferences|Settings|Properties|About)$
# Portal file picker
windowrule = float true,  match:class ^(xdg-desktop-portal-gtk)$
windowrule = float true,  match:class ^(xdg-portal-dialog)$

# ── Float: calculator, color picker, calendar popups ─────────────────────────
windowrule = float true,  match:class ^(gnome-calculator|kcalc|qalculate-gtk)$
windowrule = float true,  match:class ^(Yad|yad)$
windowrule = float true,  match:class ^(zenity)$

# ── Float: network and bluetooth settings ─────────────────────────────────────
windowrule = float true,   match:class ^(nm-connection-editor)$
windowrule = float true,   match:class ^(nm-applet)$
windowrule = float true,   match:class ^(bluedevil-wizard|blueberry)$
windowrule = float true,   match:class ^(blueman-manager)$
windowrule = size 700 500, match:class ^(nm-connection-editor)$
windowrule = size 600 450, match:class ^(blueman-manager|blueberry)$
windowrule = center true,  match:class ^(nm-connection-editor)$
windowrule = center true,  match:class ^(blueman-manager|blueberry)$

# ── Float: volume / audio control ────────────────────────────────────────────
windowrule = float true,   match:class ^(pavucontrol|pavucontrol-qt)$
windowrule = size 800 500, match:class ^(pavucontrol|pavucontrol-qt)$
windowrule = center true,  match:class ^(pavucontrol|pavucontrol-qt)$

# ── Float: file manager — centered smallish floating window ──────────────────
# Covers Dolphin (target) and Thunar (current). Super+V to tile when needed.
windowrule = float true,   match:class ^(dolphin|Dolphin|thunar|Thunar|nemo|Nemo|nautilus|Nautilus)$
windowrule = size 900 580, match:class ^(dolphin|Dolphin|thunar|Thunar|nemo|Nemo|nautilus|Nautilus)$
windowrule = center true,  match:class ^(dolphin|Dolphin|thunar|Thunar|nemo|Nemo|nautilus|Nautilus)$

# ── Float: Firefox popups and secondary windows ───────────────────────────────
# Main Firefox window tiles normally. Popups, dialogs, and child windows float.
# PiP is excluded here — handled above.
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Firefox — Sharing Indicator)
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Opening )
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Extension: )
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Firefox)$
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(About )
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Print)
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ( — Page Info)$
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Enter Password)
windowrule = float true,   match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Save )
windowrule = center true,  match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Firefox)$
windowrule = center true,  match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(About )
windowrule = center true,  match:class ^(firefox|firefox-esr|zen-browser|zen|Zen)$, match:title ^(Print)

# ── Float: general application popups ────────────────────────────────────────
# Catch common popup/dialog title patterns across all apps
windowrule = float true,   match:title ^(About )
windowrule = float true,   match:title ^(Preferences)$
windowrule = float true,   match:title ^(Settings)$
windowrule = float true,   match:title ^(Properties)$
windowrule = float true,   match:title ( Properties)$
windowrule = float true,   match:title ^(Choose )
windowrule = float true,   match:title ^(Select )
windowrule = float true,   match:title ^(Pick )
windowrule = center true,  match:title ^(About )
windowrule = center true,  match:title ^(Preferences)$
windowrule = center true,  match:title ^(Settings)$

# ── File picker sizing ────────────────────────────────────────────────────────
windowrule = size 900 600,  match:class ^(xdg-desktop-portal-gtk)$
windowrule = center true,   match:class ^(xdg-desktop-portal-gtk)$

# ── IDE: suppress spurious popup focus ───────────────────────────────────────
windowrule = no_initial_focus true, match:class ^(.*jetbrains.*)$, match:title ^(win[0-9]+)$
windowrule = no_initial_focus true, match:class ^(VSCodium|codium)$, match:title ^(Open File)
windowrule = no_initial_focus true, match:class ^(Zed)$, match:title ^(Open File)

# ── Workspace assignments ─────────────────────────────────────────────────────
# ws 1 — terminals (kitty opens here by default via keybind)
# ws 2 — browser
windowrule = workspace 2 silent, match:class ^(firefox|firefox-esr)$
windowrule = workspace 2 silent, match:class ^(zen-browser|zen|Zen)$
windowrule = workspace 2 silent, match:class ^(chromium|brave-browser)$
# ws 3 — files
# workspace assignment removed: file manager floats on current workspace via rules above
# ws 4 — comms
windowrule = workspace 4 silent, match:class ^(Signal|signal)$
windowrule = workspace 4 silent, match:class ^(discord|Discord|vesktop)$
windowrule = workspace 4 silent, match:class ^(slack|Slack)$
# ws 9 — monitoring / scratchpad terminals (routed there manually)
# ws 10 — music / media players
windowrule = workspace 10 silent, match:class ^(Spotify|spotify)$
windowrule = workspace 10 silent, match:class ^(mpv|vlc|celluloid)$

# ── Opacity ───────────────────────────────────────────────────────────────────
# Terminal — slight transparency to let blur/wallpaper breathe
windowrule = opacity 0.95 0.90, match:class ^(kitty)$
# File manager — very slight opacity so it doesn't feel painted on
windowrule = opacity 0.97 0.95, match:class ^(dolphin|Dolphin|thunar|Thunar|nemo|Nemo|nautilus|Nautilus)$
# Code editors — fully opaque so text is crisp
windowrule = opacity 1.0 1.0,  match:class ^(VSCodium|codium|Zed|zed)$
# Browser — fully opaque
windowrule = opacity 1.0 1.0,  match:class ^(firefox|zen-browser|chromium)$

# ── Tearing / VRR per app ─────────────────────────────────────────────────────
# Allow tearing for games/video on fullscreen to reduce latency
windowrule = immediate true, match:class ^(steam_app_.*)$
windowrule = immediate true, match:class ^(mpv)$

# ── Layer rules ───────────────────────────────────────────────────────────────
layerrule = blur true,      match:namespace fuzzel
layerrule = blur true,      match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur true,      match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = blur true,      match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur true,      match:namespace logout_dialog
