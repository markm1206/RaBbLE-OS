# dotfiles/hyprland/conf.d/windowrules.conf
# =============================================================================
# Unified Window Rules (v0.54+)
# Syntax: windowrule = match:<prop> <regex/val>, <effect> <val>
# =============================================================================

# ── Float these by default ────────────────────────────────────────────────────
windowrule = float 1, match:initial_class ^(pavucontrol)$
windowrule = float 1, match:initial_class ^(nm-connection-editor)$
windowrule = float 1, match:initial_class ^(blueberry.py)$
windowrule = float 1, match:initial_class ^(file-roller)$
windowrule = float 1, match:initial_class ^(org.gnome.Calculator)$
windowrule = float 1, match:initial_class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float 1, match:title ^(Open File)$
windowrule = float 1, match:title ^(Save As)$
windowrule = float 1, match:title ^(Confirm)$

# ── Size floating windows ─────────────────────────────────────────────────────
windowrule = size 800 500, match:initial_class ^(pavucontrol)$
windowrule = center 1,     match:initial_class ^(pavucontrol)$
windowrule = size 900 600, match:initial_class ^(nm-connection-editor)$
windowrule = center 1,     match:initial_class ^(nm-connection-editor)$

# ── Opacity ───────────────────────────────────────────────────────────────────
# Note: 'override' follows the values directly
windowrule = opacity 0.95 0.88 override, match:initial_class ^(foot)$
windowrule = opacity 0.95 0.88 override, match:initial_class ^(kitty)$
windowrule = opacity 0.97 0.92 override, match:initial_class ^(Code)$
windowrule = opacity 1.0 1.0 override,    match:initial_class ^(firefox)$
windowrule = opacity 1.0 1.0 override,    match:fullscreen 1

# ── XWayland fixes ────────────────────────────────────────────────────────────
windowrule = rounding 0, match:xwayland 1
windowrule = no_blur 1,  match:xwayland 1

# ── Scratchpad sizing ─────────────────────────────────────────────────────────
windowrule = size 80% 75%, match:workspace name:special:scratchpad
windowrule = center 1,     match:workspace name:special:scratchpad

# ── Steam / gaming ────────────────────────────────────────────────────────────
windowrule = float 1,      match:initial_class ^(steam)$, match:title ^(Friends List)$
windowrule = float 1,      match:initial_class ^(steam)$, match:title ^(Steam Settings)$
windowrule = fullscreen 1, match:initial_class ^(steam_app_.*)$

# ── Global Event Suppression ─────────────────────────────────────────────────
# Fixes windows that try to maximize themselves (common in v0.54)
windowrule = suppress_event maximize, match:class .*