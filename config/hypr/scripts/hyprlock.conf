# dotfiles/hyprland/scripts/hyprlock.conf
# Symlinked to ~/.config/hypr/hyprlock.conf by deploy-dotfiles playbook
# (add to loop in deploy-dotfiles.yml if desired)

general {
    disable_loading_bar = false
    grace               = 0
    hide_cursor         = true
    no_fade_in          = false
}

background {
    monitor   =
    path      = screenshot          # blur the live desktop
    blur_size = 8
    blur_passes = 3
    noise     = 0.02
    contrast  = 0.9
    brightness= 0.7
}

input-field {
    monitor    =
    size       = 340, 52
    position   = 0, -100
    halign     = center
    valign     = center

    outline_thickness = 2
    dots_size         = 0.26
    dots_spacing      = 0.15
    dots_center       = false

    outer_color = rgba(7c6fe0cc)
    inner_color = rgba(0d0f1acc)
    font_color  = rgb(e8e6f0)
    fade_on_empty = true
    placeholder_text = <span foreground="##6b6880">password...</span>
    hide_input = false

    check_color  = rgba(4ecdc4ff)
    fail_color   = rgba(e05c6fff)
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(f7a8d4ff)
}

label {
    monitor  =
    text     = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color    = rgba(e8e6f0ff)
    font_size= 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign   = center
    valign   = center
}

label {
    monitor  =
    text     = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color    = rgba(6b6880ff)
    font_size= 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign   = center
    valign   = center
}
