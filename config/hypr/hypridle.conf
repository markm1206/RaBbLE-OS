# hypridle.conf — RaBbLE-OS idle daemon configuration
# Deployed to ~/.config/hypr/hypridle.conf
#
# Lock / idle / suspend chain:
#
#   Lid close   → logind (HandleLidSwitch=suspend) triggers systemctl suspend
#                 before_sleep_cmd fires first → loginctl lock-session → hyprlock
#
#   5 min idle  → lock screen (hyprlock via loginctl lock-session)
#   5.5 min     → DPMS off (display blanked)
#   15 min      → suspend

general {
    lock_cmd            = pidof hyprlock || hyprlock  # never spawn more than one
    before_sleep_cmd    = loginctl lock-session        # lock before any suspend
    after_sleep_cmd     = hyprctl dispatch dpms on     # restore display on wake
    ignore_dbus_inhibit = false
}

listener {
    timeout    = 300                                   # 5 min — lock
    on-timeout = loginctl lock-session
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout    = 330                                   # 5.5 min — display off
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout    = 900                                   # 15 min — suspend
    on-timeout = systemctl suspend
}
