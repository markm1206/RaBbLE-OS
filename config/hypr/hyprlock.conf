# hyprlock.conf — RaBbLE-OS lock screen configuration
# Visual design mirrors SDDM theme for a unified lock/login experience.
# Palette: RaBbLE synthwave outrun (grimoire/RaBbLE-Palette.md)

general {
    disable_loading_bar = false
    grace               = 5
    hide_cursor         = true
    no_fade_in          = false
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.7
    contrast    = 0.9
}

# Clock
label {
    monitor   =
    text      = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color     = rgba(e8e6f0ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Mono
    position  = 0, 80
    halign    = center
    valign    = center
}

label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color     = rgba(6b6880ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Mono
    position  = 0, 10
    halign    = center
    valign    = center
}

input-field {
    monitor           =
    size              = 260, 52
    outline_thickness = 2
    outer_color       = rgb(ff2d78)          # magenta border
    inner_color       = rgb(0a0010)          # deep void bg
    font_color        = rgb(e8e6f0)          # off-white text
    font_family       = JetBrainsMono Nerd Font Mono
    fade_on_empty     = true
    placeholder_text  = <i>resonance key...</i>
    hide_input        = false
    rounding          = 12
    check_color       = rgb(00f5ff)          # cyan — checking
    fail_color        = rgb(e05c6f)          # red — fail
    fail_text         = <i>denied ($ATTEMPTS)</i>
    capslock_color    = rgb(f1fa8c)          # yellow — caps lock on
    position          = 0, -80
    halign            = center
    valign            = center
}
