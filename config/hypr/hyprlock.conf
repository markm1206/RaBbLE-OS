# hyprlock.conf — RaBbLE-OS lock screen configuration
# epoch-I: minimal functional config — RaBbLE synthwave palette

general {
    disable_loading_bar = false
    grace               = 5
    hide_cursor         = true
    no_fade_in          = false
}

background {
    monitor     =
    path        = screenshot
    blur_passes = 3
    blur_size   = 8
}

input-field {
    monitor           =
    size              = 220, 50
    outline_thickness = 3
    outer_color       = rgb(ff2d78)
    inner_color       = rgb(0a0010)
    font_color        = rgb(e8d5ff)
    fade_on_empty     = true
    placeholder_text  = <i>resonance key...</i>
    hide_input        = false
    rounding          = 15
    check_color       = rgb(00f5ff)
    fail_color        = rgb(ff2d78)
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    position          = 0, -20
    halign            = center
    valign            = center
}
