# dotfiles/hyprland/scripts/hyprlock.conf
# Deployed to ~/.config/hypr/hyprlock.conf by deploy-dotfiles playbook
# =============================================================================
# Palette reference (from group_vars/all.yml):
#   bg:      #0a0010   surface:  #120025   primary:  #ff2d78
#   accent:  #00f5ff   violet:   #bf5fff   pink:     #f7a8d4
#   text:    #e8d5ff   muted:    #8860aa
# =============================================================================

general {
    disable_loading_bar = true      # no loading bar — clean look
    grace               = 0
    hide_cursor         = false     # cursor visible so user can orient on resume
    no_fade_in          = false
}

background {
    monitor     =
    path        = screenshot        # blur the live desktop
    blur_size   = 8
    blur_passes = 3
    noise       = 0.02
    contrast    = 0.9
    brightness  = 0.6
}

input-field {
    monitor    =
    size       = 340, 52
    position   = 0, -100
    halign     = center
    valign     = center

    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.15
    dots_center       = true

    outer_color  = rgba(bf5fffcc)   # violet — border accent
    inner_color  = rgba(120025ee)   # surface
    font_color   = rgba(e8d5ffff)   # text

    # Always visible — prevents "where is the box" on resume
    fade_on_empty    = false
    hide_input       = false

    placeholder_text = <span foreground="##8860aa">password...</span>

    check_color    = rgba(00f5ffff)  # accent cyan — checking
    fail_color     = rgba(ff2d78ff)  # primary magenta — fail
    fail_text      = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(f7a8d4ff)  # pink — capslock warning
}

# ── Clock ─────────────────────────────────────────────────────────────────────

label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +"%-I:%M %p")</b>"
    color       = rgba(e8d5ffff)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font
    position    = 0, 200
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color       = rgba(8860aaff)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, 120
    halign      = center
    valign      = center
}