# =============================================================================
# RaBbLE — hyprland.conf
# dotfiles/hyprland/hyprland.conf
#
# This file is the entry point. It sources machine.conf (ansible-generated,
# not symlinked) for per-machine overrides, then loads all conf.d modules.
# Edit conf.d/*.conf for behaviour; machine.conf for monitor/scale/GPU.
# =============================================================================

# Machine-specific overrides (monitor, scale, GPU) — generated by ansible
# File lives at ~/.config/hypr/machine.conf — NOT in the repo
#source = ~/.config/hypr/machine.conf

# ── Modules ──────────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/look.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/keybinds.conf
#source = ~/.config/hypr/conf.d/windowrules.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/animations.conf
source = ~/.config/hypr/conf.d/workspaces.conf
source = ~/.config/hypr/conf.d/functionkeys.conf
