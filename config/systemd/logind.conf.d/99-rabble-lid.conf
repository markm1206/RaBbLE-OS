# /etc/systemd/logind.conf.d/99-rabble-lid.conf
# RaBbLE-OS lid switch policy
#
# Lid close triggers suspend. hypridle's before_sleep_cmd fires hyprlock
# before the suspend completes, so the session is locked before display off.
# HandleLidSwitchDocked=ignore prevents suspend when an external display
# is connected (HDMI docked use-case).

[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=ignore
