# ~/.config/fuzzel/fuzzel.ini — RaBbLE-OS launcher configuration
# Palette: RaBbLE synthwave outrun (grimoire/RaBbLE-Palette.md)
# Colors are rrggbbaa (8 hex digits)

[main]
font=JetBrainsMono Nerd Font Mono:size=12
dpi-aware=yes
prompt=❯
placeholder=search applications...
width=30
lines=10
tabs=4
icon-theme=Papirus-Dark
icons-enabled=yes
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
fuzzy=yes

[colors]
# bg: deep void (#0a0010) at ~94% opacity
background=0a0010f0
# text: off-white (#e8e6f0)
text=e8e6f0ff
# match highlight: hot magenta (#ff2d78)
match=ff2d78ff
# selection row bg: surface (#12132a)
selection=12132aff
selection-text=e8e6f0ff
# match in selection: electric cyan (#00f5ff)
selection-match=00f5ffff
# border: hot magenta (#ff2d78)
border=ff2d78ff

[border]
width=2
radius=10
