# dotfiles/system/logind/99-hyprland-lid.conf
# Deployed to /etc/systemd/logind.conf.d/99-hyprland-lid.conf by playbook
# =============================================================================
# Disable logind's built-in lid/power handling so hypridle owns the
# lock-before-sleep chain. Without this, logind suspends the machine
# before hyprlock can grab the display, causing the frozen-screen lockup.
# =============================================================================

[Login]
HandleLidSwitch         = ignore
HandleLidSwitchDocked   = ignore
HandleLidSwitchExternalPower = ignore
